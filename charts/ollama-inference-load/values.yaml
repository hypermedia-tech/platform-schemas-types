workloadType: OLLAMA_INFERENCE_LOAD
serviceName: &svcName ollama-inference-service
nameOverride: *svcName
serviceCatalog: unset
namespace: default
environment: unset
serviceAccount: ""
revisionHistoryLimit: 2

ingress:
  enabled: false
  host: ""

service:
  port: 80

# OLLAMA-SPECIFIC: Model to pull at startup (e.g., "phi", "llama2:13b", "mistral:7b-instruct")
models:
  primary: "phi"
  additional: []

# OLLAMA-SPECIFIC: GPU configuration
gpu:
  enabled: true
  type: "nvidia"
  count: 1

storage:
  enabled: false
  size: "10Gi"
  storageClass: ""
  accessMode: "ReadWriteOnce"

# Container configuration
container:
  replicas: 1
  image:
    repository: ollama/ollama
    tag: "latest"
  containerPorts:
    - portName: "http"
      portNumber: 11434
      protocol: "TCP"
      servicePort: 80
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  secretStore:
    name: vault-backend
  livenessProbe:
    enabled: true
    type: "http"
    path: "/"
    port: 11434
    scheme: "HTTP"
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    enabled: true
    type: "http"
    path: "/"
    port: 11434
    scheme: "HTTP"
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  startupProbe:
    enabled: true
    type: "http"
    path: "/api/tags"
    port: 11434
    scheme: "HTTP"
    initialDelaySeconds: 10
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 30
  environment:
    - name: OLLAMA_NUM_PARALLEL
      value: 1
    - name: OLLAMA_KEEP_ALIVE
      value: 5m
  secrets: []
